<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adam Beebe · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Figtree:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--g:#05E5AF;--dk:#10201F;--dk2:#182E2C;--w:#fff;}
body{background:var(--dk);font-family:'Figtree',sans-serif;color:var(--w);min-height:100vh;}

/* LOCK */
#lock-screen{position:fixed;inset:0;background:var(--dk);display:flex;align-items:center;justify-content:center;z-index:100;}
.lock-box{background:var(--dk2);border:1px solid rgba(5,229,175,.2);border-radius:16px;padding:36px 32px;width:320px;text-align:center;}
.lock-logo{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;margin-bottom:24px;}
.lock-logo span{color:var(--g);}
.lock-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:12px 16px;color:white;font-size:18px;letter-spacing:.2em;text-align:center;outline:none;margin-bottom:12px;}
.lock-btn{width:100%;background:var(--g);color:var(--dk);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;padding:13px;border-radius:8px;border:none;cursor:pointer;}
.lock-err{color:#ff6b6b;font-size:12px;margin-top:8px;display:none;}

/* DASHBOARD */
#dash{display:none;max-width:900px;margin:0 auto;padding:24px;}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid rgba(5,229,175,.12);}
.dash-title{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;}
.dash-title span{color:var(--g);}
.dash-actions{display:flex;gap:10px;}
.btn-sm{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:8px 14px;border-radius:8px;border:none;cursor:pointer;}
.btn-outline{background:transparent;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.15);}
.btn-outline:hover{color:white;border-color:rgba(255,255,255,.3);}
.btn-danger{background:rgba(255,80,80,.1);color:#ff6b6b;border:1px solid rgba(255,80,80,.2);}

/* SUMMARY STRIP */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:28px;}
.summary-card{background:var(--dk2);border:1px solid rgba(5,229,175,.12);border-radius:10px;padding:14px 16px;text-align:center;}
.summary-num{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:var(--g);line-height:1;}
.summary-lbl{font-size:11px;color:rgba(255,255,255,.4);margin-top:3px;}
.summary-new{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;color:#ffcc00;margin-top:2px;}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid rgba(5,229,175,.12);margin-bottom:20px;}
.tab{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:10px 18px;cursor:pointer;color:rgba(255,255,255,.4);border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab.on{color:var(--g);border-bottom-color:var(--g);}

/* SUBMISSION CARDS */
.sub-list{display:flex;flex-direction:column;gap:10px;}
.sub-card{background:var(--dk2);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px 18px;}
.sub-card.new-sub{border-color:rgba(5,229,175,.25);}
.sub-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.sub-name{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--w);}
.sub-time{font-size:11px;color:rgba(255,255,255,.3);}
.sub-phone{font-size:13px;color:rgba(5,229,175,.8);margin-bottom:6px;}
.sub-detail{font-size:12px;color:rgba(255,255,255,.5);line-height:1.6;}
.sub-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.tag{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;padding:3px 8px;border-radius:12px;background:rgba(5,229,175,.1);border:1px solid rgba(5,229,175,.2);color:var(--g);}
.sub-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06);}
.status-badge{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:12px;}
.status-new{background:rgba(255,200,0,.1);color:#ffcc00;border:1px solid rgba(255,200,0,.2);}
.status-done{background:rgba(5,229,175,.08);color:rgba(5,229,175,.5);border:1px solid rgba(5,229,175,.15);}
.btn-handled{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;padding:6px 12px;border-radius:6px;border:1px solid rgba(5,229,175,.3);background:transparent;color:var(--g);cursor:pointer;}
.btn-handled:hover{background:rgba(5,229,175,.1);}
.empty{text-align:center;padding:40px;color:rgba(255,255,255,.25);font-size:14px;font-style:italic;}
</style>
</head>
<body>

<!-- LOCK -->
<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-logo">ADAM <span>BEEBE</span></div>
    <div style="font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(5,229,175,.5);margin-bottom:20px;">Admin Dashboard</div>
    <input class="lock-input" type="password" id="pass-input" placeholder="••••••" onkeydown="if(event.key==='Enter')unlock()">
    <button class="lock-btn" onclick="unlock()">Unlock</button>
    <div class="lock-err" id="lock-err">Incorrect password</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dash">
  <div class="dash-header">
    <div class="dash-title">ADAM <span>BEEBE</span> · Dashboard</div>
    <div class="dash-actions">
      <a href="index.html" class="btn-sm btn-outline">← Site</a>
      <button class="btn-sm btn-danger" onclick="clearAll()">Clear All</button>
    </div>
  </div>

  <div class="summary">
    <div class="summary-card"><div class="summary-num" id="s-quote">0</div><div class="summary-lbl">Quotes</div><div class="summary-new" id="s-quote-new"></div></div>
    <div class="summary-card"><div class="summary-num" id="s-referral">0</div><div class="summary-lbl">Referrals</div><div class="summary-new" id="s-ref-new"></div></div>
    <div class="summary-card"><div class="summary-num" id="s-service">0</div><div class="summary-lbl">Service</div><div class="summary-new" id="s-svc-new"></div></div>
    <div class="summary-card"><div class="summary-num" id="s-upgrade">0</div><div class="summary-lbl">Upgrades</div><div class="summary-new" id="s-upg-new"></div></div>
  </div>

  <div class="tabs">
    <div class="tab on" onclick="switchTab('all',this)">All</div>
    <div class="tab" onclick="switchTab('quote',this)">Quotes</div>
    <div class="tab" onclick="switchTab('referral',this)">Referrals</div>
    <div class="tab" onclick="switchTab('service',this)">Service</div>
    <div class="tab" onclick="switchTab('upgrade',this)">Upgrades</div>
  </div>

  <div class="sub-list" id="sub-list"></div>
</div>

<script>
const PASS = '460264';
let currentTab = 'all';

function unlock() {
  if (document.getElementById('pass-input').value === PASS) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('dash').style.display = 'block';
    loadDash();
  } else {
    document.getElementById('lock-err').style.display = 'block';
  }
}

function getAll() {
  return JSON.parse(localStorage.getItem('ab_submissions') || '[]');
}

function saveAll(all) {
  localStorage.setItem('ab_submissions', JSON.stringify(all));
}

function loadDash() {
  const all = getAll();
  const types = ['quote','referral','service','upgrade'];
  types.forEach(t => {
    const items = all.filter(x=>x.type===t);
    const newCount = items.filter(x=>x.status==='new').length;
    document.getElementById(`s-${t==='referral'?'ref':t==='service'?'svc':t==='upgrade'?'upg':t}`).textContent = items.length;
    const newEl = document.getElementById(`s-${t==='referral'?'ref':t==='service'?'svc':t==='upgrade'?'upg':t}-new`);
    if (newEl) newEl.textContent = newCount > 0 ? `${newCount} new` : '';
  });
  renderList(currentTab);
}

function switchTab(type, el) {
  currentTab = type;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  renderList(type);
}

function renderList(type) {
  const all = getAll();
  const items = type === 'all' ? all : all.filter(x=>x.type===type);
  const list = document.getElementById('sub-list');
  if (items.length === 0) { list.innerHTML = '<div class="empty">No submissions yet.</div>'; return; }

  list.innerHTML = items.map((sub,idx) => {
    const ts = new Date(sub.ts).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
    const isNew = sub.status === 'new';
    let detail = '';
    let tags = '';

    if (sub.type === 'quote') {
      detail = `<div class="sub-detail">Address: ${sub.address||'—'}</div>`;
      tags = (sub.interests||[]).map(i=>`<span class="tag">${i}</span>`).join('');
    } else if (sub.type === 'referral') {
      detail = `<div class="sub-detail">Neighbor: ${sub.nbrName} ${sub.nbrPhone ? '· '+sub.nbrPhone : ''}</div>${sub.notes?`<div class="sub-detail">${sub.notes}</div>`:''}`;
    } else if (sub.type === 'service') {
      const taskHtml = (sub.tasks||[]).map(t=>`${t.name}: ${t.issue}`).join(' · ');
      detail = `<div class="sub-detail">${taskHtml}</div><div class="sub-detail" style="margin-top:4px;">Available: ${(sub.days||[]).slice(0,3).join(', ')}${(sub.times||[]).length?' · '+(sub.times||[]).join('/'):''}`;
    } else if (sub.type === 'upgrade') {
      tags = (sub.interests||[]).map(i=>`<span class="tag">${i}</span>`).join('');
    }

    const realIdx = getAll().findIndex(x=>x.id===sub.id);

    return `<div class="sub-card ${isNew?'new-sub':''}">
      <div class="sub-top">
        <div>
          <div class="sub-name">${sub.name||sub.yourName||'Unknown'}</div>
          <div style="font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(5,229,175,.4);margin-top:2px;">${sub.type}</div>
        </div>
        <div class="sub-time">${ts}</div>
      </div>
      <div class="sub-phone">${sub.phone||sub.yourPhone||''}</div>
      ${detail}
      ${tags?`<div class="sub-tags">${tags}</div>`:''}
      <div class="sub-footer">
        <span class="status-badge ${isNew?'status-new':'status-done'}">${isNew?'New':'Handled'}</span>
        ${isNew?`<button class="btn-handled" onclick="markDone(${realIdx})">Mark Handled</button>`:''}
      </div>
    </div>`;
  }).join('');
}

function markDone(idx) {
  const all = getAll();
  if (all[idx]) { all[idx].status = 'done'; saveAll(all); loadDash(); }
}

function clearAll() {
  if (confirm('Clear all submissions? This cannot be undone.')) {
    localStorage.removeItem('ab_submissions');
    loadDash();
  }
}
</script>
</body>
</html>
